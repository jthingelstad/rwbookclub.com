<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <meta name="csrf" content="{{ csrf }}">
  <title>{% block title %}R/W Book Club{% endblock %} · Oliver</title>
  <link rel="stylesheet" href="/webapp/static/pico.min.css?v={{ assets_v }}">
  <link rel="stylesheet" href="/webapp/static/webapp.css?v={{ assets_v }}">
</head>
<body data-page="{% block page %}{{ nav or '' }}{% endblock %}">
  <header class="top">
    <a href="/webapp" class="{{ 'active' if nav=='home' else '' }}">🏠</a>
    <a href="/webapp/ratings" class="{{ 'active' if nav=='ratings' else '' }}">Ratings</a>
    <a href="/webapp/reviews" class="{{ 'active' if nav=='reviews' else '' }}">Reviews</a>
    <a href="/webapp/lists" class="{{ 'active' if nav=='lists' else '' }}">Lists</a>
    <a href="/webapp/memories" class="{{ 'active' if nav=='member-memories' else '' }}">Memories</a>
    <a href="/webapp/bookcloud" class="{{ 'active' if nav=='member-bookcloud' else '' }}">Book cloud</a>
    <a href="/webapp/profile" class="{{ 'active' if nav=='profile' else '' }}">Profile</a>
    {% if is_admin %}
    <details class="admin-nav">
      <summary>Admin ▾</summary>
      <nav>
        <a href="/webapp/admin/books" class="{{ 'active' if nav=='admin-books' else '' }}">Books</a>
        <a href="/webapp/admin/meetings" class="{{ 'active' if nav=='admin-meetings' else '' }}">Meetings</a>
        <a href="/webapp/admin/members" class="{{ 'active' if nav=='admin-members' else '' }}">Members</a>
        <a href="/webapp/admin/lists" class="{{ 'active' if nav=='admin-lists' else '' }}">Club lists</a>
        <a href="/webapp/admin/events" class="{{ 'active' if nav=='admin-events' else '' }}">Events</a>
        <a href="/webapp/admin/bookcloud" class="{{ 'active' if nav=='admin-bookcloud' else '' }}">Book cloud</a>
        <a href="/webapp/admin/memories" class="{{ 'active' if nav=='admin-memories' else '' }}">Memories</a>
      </nav>
    </details>
    {% endif %}
    <span class="sp"></span>
    <span class="who">{{ member_name }}</span>
    <button id="publishBtn" class="{{ 'dirty' if site_dirty else '' }}"
            title="Push your changes to the live site">Publish</button>
  </header>
  <main>
    {% if error %}<p class="err">{{ error }}</p>{% endif %}
    {% block content %}{% endblock %}
  </main>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  {% block data %}{% endblock %}
  <script src="/webapp/static/webapp.js?v={{ assets_v }}" defer></script>
</body>
</html>
