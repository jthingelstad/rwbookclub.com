{% extends "base.html" %}
{% set nav = "meetings" %}
{% block title %}Edit meeting{% endblock %}
{% block content %}
  <p class="muted"><a href="/webapp/admin/meetings">← all meetings</a></p>
  <h1>Meeting {{ meeting.date or 'TBD' }}</h1>
  <p class="muted">Books: {{ meeting.book_slugs|join(', ') or '—' }}</p>
  <form method="post" action="/webapp/admin/meetings/{{ meeting.id }}">
    <input type="hidden" name="csrf" value="{{ csrf }}">
    <label>Date (YYYY-MM-DD)</label><input type="text" name="date" value="{{ meeting.date or '' }}">
    <label>Start time (HH:MM, local)</label><input type="text" name="start_time" value="{{ meeting.start_time or '' }}">
    <label>Location</label><input type="text" name="location" value="{{ meeting.location or '' }}">
    <label>Notes</label><textarea name="notes">{{ meeting.notes or '' }}</textarea>
    <label class="row"><input type="checkbox" name="held" value="1" style="width:auto" {{ 'checked' if not meeting.placeholder }}> &nbsp;Held (not tentative)</label>
    <label>Host(s)</label>
    <select name="hosts" multiple size="6">
      {% for m in members %}<option value="{{ m.slug }}" {{ 'selected' if m.slug in meeting.host_slugs }}>{{ m.name }}{{ '' if m.current else ' (former)' }}</option>{% endfor %}
    </select>
    <p class="muted">Hold ⌘/Ctrl to select multiple.</p>
    <p style="margin-top:1rem"><button class="primary" type="submit">Save meeting</button></p>
  </form>
{% endblock %}
