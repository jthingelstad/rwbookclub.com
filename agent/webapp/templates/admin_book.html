{% extends "base.html" %}
{% set nav = "admin-books" %}
{% block title %}Edit · {{ book.title }}{% endblock %}
{% block content %}
  <p class="muted"><a href="/webapp/admin/books">← all books</a></p>
  <h1>{{ book.title }}</h1>
  <form method="post" action="/webapp/admin/books/{{ book.slug }}">
    <input type="hidden" name="csrf" value="{{ csrf }}">
    <label>Title <span class="muted">(read-only — renaming would change the URL/slug)</span></label>
    <input type="text" value="{{ book.title }}" disabled>
    <label>Subtitle</label><input type="text" name="subtitle" value="{{ book.subtitle or '' }}">
    <label>Topic</label>
    <select name="topic">
      <option value="">—</option>
      {% for t in topics %}<option value="{{ t }}" {{ 'selected' if book.topic == t }}>{{ t }}</option>{% endfor %}
    </select>
    <label class="row"><input class="w-auto" type="checkbox" name="fiction" value="1" {{ 'checked' if book.fiction }}> &nbsp;Fiction</label>
    <label>First published (year)</label><input type="number" name="publication_year" value="{{ book.publication_year or '' }}">
    <label>Page count</label><input type="number" name="page_count" value="{{ book.page_count or '' }}">
    <label>ISBN-13</label><input type="text" name="isbn13" value="{{ book.isbn13 or '' }}">
    <label>Open Library key</label><input type="text" name="ol_key" value="{{ book.ol_key or '' }}">
    <label>Authors <span class="muted">(comma-separated)</span></label>
    <input type="text" name="authors" value="{{ book.authors|join(', ') }}">
    <label>Picked by <span class="muted">(derived from the meeting host — edit it on the meeting)</span></label>
    <p class="muted m-note">{{ book.pickers|join(', ') if book.pickers else '—' }}</p>
    <label>Synopsis</label><textarea name="synopsis">{{ book.synopsis or '' }}</textarea>
    <p class="mt-10"><button class="primary" type="submit">Save book</button></p>
  </form>
{% endblock %}
