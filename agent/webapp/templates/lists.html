{% extends "base.html" %}
{% from "_list_card.html" import list_card %}
{% set nav = "lists" %}
{% block title %}Lists{% endblock %}
{% block content %}
  <h1>Your lists</h1>
  {% for lst in lists %}{{ list_card(lst, books, titles, csrf) }}{% else %}<p class="muted">No lists yet.</p>{% endfor %}

  <h2>New list</h2>
  <form method="post" action="/webapp/lists/create" class="card">
    <input type="hidden" name="csrf" value="{{ csrf }}">
    <label>Name</label><input type="text" name="name" required>
    <label>Description</label><input type="text" name="description">
    <p style="margin-top:.8rem"><button class="primary">Create list</button></p>
  </form>
{% endblock %}
