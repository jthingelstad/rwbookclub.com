{% extends "base.html" %}
{% set nav = "members" %}
{% block title %}Members (admin){% endblock %}
{% block content %}
  <h1>Members</h1>
  <form method="post" action="/webapp/admin/members" class="card">
    <input type="hidden" name="csrf" value="{{ csrf }}"><input type="hidden" name="op" value="add">
    <label>Add a member</label>
    <div class="row"><input type="text" name="name" placeholder="Name" style="flex:1"><button class="primary">Add</button></div>
  </form>
  <table>
    {% for m in members %}
    <tr>
      <td><a href="/webapp/admin/members/{{ m.slug }}">{{ m.name }}</a>{% if not m.current %} <span class="muted">· former</span>{% endif %}</td>
      <td style="text-align:right">
        <a class="btn" href="/webapp/admin/members/{{ m.slug }}">Edit</a>
      </td>
    </tr>
    {% endfor %}
  </table>
{% endblock %}
