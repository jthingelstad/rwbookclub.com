name: Refresh from Airtable

# Manual trigger only. Pulls fresh data from Airtable, regenerates
# resized cover/photo art, commits any changes, then builds and
# deploys the site.

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.commit.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Fetch Airtable data
        env:
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
        run: python scripts/fetch_airtable.py

      - name: Process cover and member images
        run: python scripts/process_images.py

      - name: Commit refreshed data and images
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/_data src/assets/images
          if git diff --staged --quiet; then
            echo "No changes from Airtable."
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Refresh data from Airtable"
            git push
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: refresh
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (post-refresh)
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.refresh.outputs.sha }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build site
        run: npx @11ty/eleventy

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
