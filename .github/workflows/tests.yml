name: tests

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --locked
      - name: Lint (ruff)
        run: uv run --locked ruff check .
      - name: Format (ruff)
        run: uv run --locked ruff format --check .
      - name: Static types (incremental scope)
        run: uv run --locked mypy
      - name: Audit locked Python environment
        run: uv run --locked pip-audit
      - name: Tests with coverage floor
        run: uv run --locked pytest tests/ -q --cov=agent --cov=corpus --cov-report=term-missing:skip-covered --cov-fail-under=75

  website:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: npm
      - run: uv sync --locked --no-dev
      - run: npm ci
      - name: Audit JavaScript dependencies
        run: npm audit --audit-level=moderate
      - name: Test JavaScript corpus consumers
        run: npm test
      - name: Generate public-safe fixture corpus
        env:
          OLIVER_DB_PATH: ${{ runner.temp }}/oliver-site-build.db
          OLIVER_CORPUS_DIR: ${{ runner.temp }}/corpus
        run: uv run --locked --no-dev python -m agent.script.build_fixture_corpus
      - name: Build website
        env:
          OLIVER_CORPUS_DIR: ${{ runner.temp }}/corpus
        run: npm run build
