name: Deploy

# Builds the static site from data and images already committed to the
# repo and deploys to GitHub Pages. Does NOT touch Airtable. To refresh
# data from Airtable use the "Refresh from Airtable" workflow instead.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deploy; in-progress runs finish before new
# pushes start.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install -r agent/requirements.txt -r tests/requirements.txt

      - name: Validate corpus
        run: python -m corpus.validate

      - name: Run Python tests
        run: python -m pytest tests

      - name: Build site
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: website/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
