# Pre-commit hooks for Oliver. Runs `ruff check` on every commit — the same gate
# CI enforces on push (see .github/workflows/tests.yml).
#
# Activate once per clone:
#   uv sync --locked && uv run pre-commit install
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
